---
file:
  /app/dist/main.js:
    exists: true
  /app/package.json:
    exists: true
  /app/package-lock.json:
    exists: true
  /app/mise.toml:
    exists: true
  /app/node_modules/@mariozechner/pi-coding-agent/package.json:
    exists: true
  /workspace:
    exists: true
    filetype: directory
  /data/sessions:
    exists: true
    filetype: directory
  /usr/bin/node:
    exists: true
  /usr/bin/gh:
    exists: true
  /usr/bin/curl:
    exists: true
  /sbin/tini:
    exists: true

user:
  nonroot:
    exists: true

command:
  "node --version":
    exit-status: 0
  "gh --version":
    exit-status: 0
    stdout:
      - "gh version"
  "curl --version":
    exit-status: 0
